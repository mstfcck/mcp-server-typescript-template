name: Security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run audit:prod

  codeql-capability:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: read
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}

    steps:
      - id: check
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.request("GET /repos/{owner}/{repo}/code-scanning/alerts", {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 1
              });

              core.setOutput("enabled", "true");
            } catch (error) {
              if (error.status === 403 || error.status === 404) {
                core.warning(
                  "Code scanning is not enabled for this repository. Skipping CodeQL analysis until the feature is enabled in repository settings."
                );
                core.setOutput("enabled", "false");
                return;
              }

              throw error;
            }

  codeql:
    needs: codeql-capability
    if: ${{ needs.codeql-capability.outputs.enabled == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: github/codeql-action/analyze@v3
